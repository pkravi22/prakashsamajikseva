<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prakash Samajik Seva - Coming Soon</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(
                135deg,
                #667eea 0%,
                #764ba2 50%,
                #ff6b6b 100%
            );
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 60px 70px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            max-width: 900px;
            width: 100%;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 2rem;
            color: #ffeb3b;
            font-weight: 700;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.3rem;
            color: #ffffff;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .tagline {
            margin-top: 20px;
            font-size: 1.7rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.8;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }

        .tagline span {
            display: block;
            color: #ffeb3b;
            font-size: 2rem;
            margin-top: 10px;
            font-weight: 800;
        }

        .footer {
            margin-top: 35px;
            color: rgba(255,255,255,0.85);
            font-size: 1rem;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }

            h2 {
                font-size: 1.4rem;
            }

            p {
                font-size: 1rem;
            }

            .tagline {
                font-size: 1.2rem;
            }

            .tagline span {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            Prakash Samajik Seva
        </div>

        <h1>Coming Soon</h1>

        <h2>🚀 We Will Go Live on 5 June 2026 🚀</h2>

        <p>
            Something exciting is on the way. Stay tuned!
        </p>

        <div class="tagline">
            हर कदम शिक्षा की ओर,
            <span>
                आपका एक कदम किसी के जीवन का नया अध्याय
            </span>
        </div>

        <div class="footer">
            Empowering Education • Creating Opportunities • Building Futures
        </div>
    </div>

</body>
</html>
