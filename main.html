<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - 5 June</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #667eea 0%,
                #764ba2 50%,
                #ff6b6b 100%
            );
            font-family:Arial, Helvetica, sans-serif;
            text-align:center;
        }

        .container{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            padding:50px 70px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.25);
        }

        h1{
            font-size:4rem;
            font-weight:900;
            color:white;
            text-transform:uppercase;
            letter-spacing:4px;
            text-shadow:3px 3px 10px rgba(0,0,0,0.3);
            margin-bottom:20px;
        }

        h2{
            font-size:2rem;
            color:#ffeb3b;
            font-weight:bold;
            margin-bottom:15px;
        }

        p{
            font-size:1.3rem;
            color:white;
            font-weight:600;
        }

        @media(max-width:768px){
            h1{
                font-size:2.5rem;
            }

            h2{
                font-size:1.5rem;
            }

            p{
                font-size:1rem;
            }

            .container{
                width:90%;
                padding:35px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Coming Soon</h1>
        <h2>🚀 We Will Go Live on 5 June 2026 🚀</h2>
        <p>Something exciting is on the way. Stay tuned!</p>
    </div>

</body>
</html>
